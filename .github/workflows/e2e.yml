name: E2E (Playwright)

# Runs the Playwright smoke suite against a freshly-built frontend that
# talks to a real backend backed by ephemeral Postgres + Redis services.
# This is intentionally separate from `ci.yml` so a slow Playwright run
# never blocks the fast pytest/lint/encoding loop -- they run in parallel.

on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: skn_app_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skn_app_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Backend env -- shared with the e2e admin seed step.
      DATABASE_URL: postgresql+asyncpg://postgres:password@127.0.0.1:5432/skn_app_db
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-secret-key
      ENCRYPTION_KEY: zsi41Kqura0QA7xUGAtHnwoAnPP3IAddcu-cb2mfGCA=
      ENVIRONMENT: development
      LINE_CHANNEL_ACCESS_TOKEN: ci-access-token
      LINE_CHANNEL_SECRET: ci-channel-secret
      LINE_LOGIN_CHANNEL_ID: "2000000000"
      SERVER_BASE_URL: http://localhost:8000
      ADMIN_URL: http://localhost:3000
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      ADMIN_DEFAULT_PASSWORD: e2e-test-password
      # Frontend env -- the rewrite proxy points at the local backend so
      # the Playwright browser hits real endpoints, not a mock.
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_DEV_MODE: "false"
      # Playwright env -- read by e2e/utils/auth.ts.
      E2E_ADMIN_USERNAME: admin
      E2E_ADMIN_PASSWORD: e2e-test-password
      BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Create backend/app/.env stub for safety scripts
        # backend/scripts/_script_safety.py reads backend/app/.env to
        # determine the active DB target as a guardrail. CI uses env
        # vars instead of files, so we drop a minimal stub matching the
        # env values above so seed_admin.py's safety check passes.
        working-directory: backend
        run: |
          mkdir -p app
          cat > app/.env <<EOF
          DATABASE_URL=$DATABASE_URL
          ENVIRONMENT=$ENVIRONMENT
          EOF

      - name: Seed admin user
        working-directory: backend
        run: python scripts/seed_admin.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in 60s. Last log lines:"
          tail -50 backend.log
          exit 1

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run start > frontend.log 2>&1 &
          echo $! > frontend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in 60s. Last log lines:"
          tail -50 frontend.log
          exit 1

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Stop backend / frontend (always)
        if: always()
        run: |
          [ -f backend/backend.pid ] && kill "$(cat backend/backend.pid)" || true
          [ -f frontend/frontend.pid ] && kill "$(cat frontend/frontend.pid)" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 3

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: frontend/frontend.log
          retention-days: 3
